name: check-and-short-search

on:
  workflow_dispatch:
    inputs:
      seconds:
        description: "Seconds per shard for a short test run"
        required: false
        default: "120"
      box_min:
        description: "Minimum integer coordinate for search vertices"
        required: false
        default: "-2"
      box_max:
        description: "Maximum integer coordinate for search vertices"
        required: false
        default: "4"
      top_k:
        description: "How many high-scoring moves are kept at each step"
        required: false
        default: "24"
  push:
    branches: ["main"]

jobs:
  check-known-23:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify the known 23-link trail
        run: python scripts/check_trail.py data/ripa_23_trail.json --expected-links 23 --require-full

  short-search-22:
    runs-on: ubuntu-latest
    needs: check-known-23
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run short shard ${{ matrix.shard }}
        run: |
          mkdir -p results
          python scripts/search_22_integer_box.py \
            --links 22 \
            --seconds "${{ github.event.inputs.seconds || '120' }}" \
            --box-min "${{ github.event.inputs.box_min || '-2' }}" \
            --box-max "${{ github.event.inputs.box_max || '4' }}" \
            --top-k "${{ github.event.inputs.top_k || '24' }}" \
            --shard "${{ matrix.shard }}" \
            --shards 4 \
            --out "results/short_best_shard_${{ matrix.shard }}.json"
      - name: Upload short shard result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-22-shard-${{ matrix.shard }}
          path: results/short_best_shard_${{ matrix.shard }}.json
          if-no-files-found: warn
