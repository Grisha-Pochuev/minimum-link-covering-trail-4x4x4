name: smart-search-13-cover-stitch-cache
run-name: smart-search-13-cover-stitch-cache

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      seconds:
        description: "Seconds per shard. Use 180 for smoke, 21000 for full."
        required: false
        default: "180"
      threads:
        description: "Threads per shard. Use 4."
        required: false
        default: "4"
      seed:
        description: "Seed. Use 20260704."
        required: false
        default: "20260704"

jobs:
  check-known-23:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_trail.py data/ripa_23_trail.json --expected-links 23 --require-full

  cover-stitch-cache-smoke:
    runs-on: ubuntu-latest
    needs: check-known-23
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare C++ engine
        run: python scripts/prepare_cover_stitch_cache_engine.py --out build/cover_stitch_cache_search.cpp
      - name: Compile C++ engine
        run: g++ -O3 -std=c++17 -pthread -DNDEBUG build/cover_stitch_cache_search.cpp -o cover_stitch_cache_search
      - name: Run tiny local smoke shard
        run: |
          mkdir -p results/cover_stitch_cache
          ./cover_stitch_cache_search --input-dir runs --input-dir candidates --seconds "${{ github.event.inputs.seconds || '180' }}" --threads "${{ github.event.inputs.threads || '4' }}" --seed "${{ github.event.inputs.seed || '20260704' }}" --shard 0 --shards 20 --out results/cover_stitch_cache/cover_stitch_cache_best_shard_0.json
      - name: Check smoke result
        if: always()
        run: |
          if [ -f results/cover_stitch_cache/cover_stitch_cache_best_shard_0.json ]; then
            python scripts/check_scaled_trail.py results/cover_stitch_cache/cover_stitch_cache_best_shard_0.json --max-links 22
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cover-stitch-cache-smoke-shard-0
          path: results/cover_stitch_cache/cover_stitch_cache_best_shard_0.json
          if-no-files-found: warn
